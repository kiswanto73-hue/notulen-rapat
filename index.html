<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotulaAI PRO - Transkrip Nyata dengan OpenAI API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f1f5f9; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="glass sticky top-0 z-50 border-b border-slate-800 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-emerald-500 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-microphone-lines text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-lg text-white">Notula<span class="text-emerald-400">AI</span> PRO</h1>
                <p class="text-[10px] text-slate-400">Sistem Pemroses Suara Asli Real-Time</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-lg border border-emerald-500/20 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span> Sistem Enterprise Terkunci
            </span>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 flex-grow">
        
        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="glass p-6 rounded-2xl shadow-xl flex flex-col gap-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                    <i class="fa-solid fa-upload text-blue-400"></i> Upload File Suara Asli
                </h2>
                
                <div id="drop-zone" class="border-2 border-dashed border-slate-700 hover:border-blue-500/50 rounded-xl p-8 text-center cursor-pointer bg-slate-900/40 transition-all flex flex-col items-center justify-center gap-3">
                    <div id="uploader-icon" class="w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center text-slate-400">
                        <i class="fa-solid fa-file-audio text-2xl"></i>
                    </div>
                    <div>
                        <p id="uploader-text" class="text-sm font-semibold text-slate-200">Klik untuk memilih file rekaman</p>
                        <p class="text-xs text-slate-500 mt-1">Mendukung MP3, WAV, M4A, MP4 (Maks 25MB)</p>
                    </div>
                    <input type="file" id="audio-input" class="hidden" accept="audio/*,video/*">
                </div>

                <button id="btn-proses" disabled onclick="prosesAudioAsli()" class="w-full bg-slate-800 text-slate-500 font-bold py-4 rounded-xl text-xs tracking-widest uppercase transition-all flex items-center justify-center gap-2 cursor-not-allowed">
                    <i class="fa-solid fa-bolt"></i> Hubungkan & Transkrip Sekarang
                </button>
            </div>

            <div id="progress-card" class="glass p-6 rounded-2xl shadow-xl hidden flex flex-col gap-3">
                <div class="text-xs font-bold text-blue-400 flex items-center gap-2">
                    <i class="fa-solid fa-spinner animate-spin"></i> <span id="status-text">Mengirim file suara ke Server AI...</span>
                </div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-400 h-full w-1/2 animate-pulse"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col gap-4">
